<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Simulators Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4 custom-navbar">
        <div class="container-fluid px-4 align-items-center">
            <span class="navbar-brand mb-0 h1 fw-bold tracking-tight">
                <i class="bi bi-cpu-fill text-info me-2"></i>IoT Control Center
            </span>
            <span class="text-white-50 badge bg-dark bg-opacity-50 px-3 py-2 rounded-pill" id="lastSyncTime">
                <i class="bi bi-arrow-repeat me-1"></i>Oczekuję...
            </span>
        </div>
    </nav>

    <div class="container-fluid px-4 pb-5">
        <div id="alertsContainer"></div>

        <div class="row">
            <div class="col-lg-8 col-xl-9 border-end border-light-subtle pe-lg-4">
                <div class="d-flex justify-content-between align-items-end mb-3">
                    <h4 class="fw-bold text-dark mb-0"><i class="bi bi-activity text-primary me-2"></i> Aktywne Symulatory</h4>
                    <span class="badge bg-primary rounded-pill" id="simulatorsCount">0</span>
                </div>
                <hr class="mt-0 mb-4 text-secondary opacity-25">

                <div class="row" id="simulatorsGrid">
                    <div class="col-12 text-center mt-5" id="loadingSpinner">
                        <div class="spinner-border text-primary shadow-sm" role="status" style="width: 3rem; height: 3rem;">
                            <span class="visually-hidden">Ładowanie...</span>
                        </div>
                        <p class="mt-3 text-muted fw-medium">Nawiązywanie połączenia z rejestrem...</p>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 col-xl-3 ps-lg-4 mt-5 mt-lg-0">
                <div class="d-flex justify-content-between align-items-end mb-3">
                    <h5 class="fw-bold text-secondary mb-0"><i class="bi bi-server text-info me-2"></i> Infrastruktura Sieciowa</h5>
                    <span class="badge bg-secondary rounded-pill" id="infraCount">0</span>
                </div>
                <hr class="mt-0 mb-4 text-secondary opacity-25">

                <div class="row" id="infraGrid">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
